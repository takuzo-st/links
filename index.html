<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おすすめサービス | Investment & Economy</title>
<!-- フォントの読み込み -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Tailwind CSS の読み込み -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Noto Sans JP"', 'sans-serif'],
          mono: ['"DM Mono"', 'monospace'],
        },
        colors: {
          surface: '#fbfbf9', /* 背景色：ほんのり温かみのあるオフホワイト */
          card: '#ffffff',
          primary: '#1c1c1c',
          secondary: '#666666',
          tertiary: '#999999',
          border: '#eaeaea'
        }
      }
    }
  }
</script>
<style>
  /* 全体の背景設定 */
  body {
    background-color: theme('colors.surface');
  }
  
  /* カードのアニメーション設定 */
  .link-card {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .link-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.08);
    border-color: #d4d4d4;
  }
  
  /* 矢印のアニメーション */
  .link-card:hover .arrow-icon {
    transform: translateX(4px);
    color: theme('colors.primary');
  }
  
  /* アイコン背景のアニメーション */
  .icon-wrapper {
    transition: all 0.3s ease;
  }
  .link-card:hover .icon-wrapper {
    background-color: theme('colors.primary');
    color: white;
  }
</style>
</head>
<body class="text-primary min-h-screen flex flex-col items-center px-5 py-16 sm:py-24">

  <!-- ヘッダーセクション -->
  <header class="w-full max-w-md text-center mb-12 flex flex-col items-center">
    
    <!-- アイコン/ロゴ領域（imgタグ等に差し替え可能です） -->
    <div class="w-16 h-16 rounded-full bg-white border border-border shadow-sm flex items-center justify-center mb-6">

    </div>
    
    <div class="font-mono text-xs font-medium tracking-widest text-tertiary uppercase mb-3">
      Investment · Economy
    </div>
    <h1 class="text-2xl sm:text-3xl font-semibold tracking-wider mb-6">
      おすすめサービス

    <div class="w-8 h-[1px] bg-border mb-6"></div>
    <p class="text-sm text-secondary tracking-wider leading-relaxed">

  <!-- リンク一覧セクション -->

    <!-- 【追加】 note のリンク -->
    <a href="https://note.com/asset_samurai" target="_blank" rel="noopener noreferrer" class="link-card group flex items-center gap-4 sm:gap-5 p-4 sm:p-5 bg-card border border-border rounded-2xl no-underline text-inherit">
      <div class="icon-wrapper w-12 h-12 flex items-center justify-center bg-[#f4f4f0] rounded-xl shrink-0 text-primary">
        <!-- 本のアイコン -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-mono text-[10px] tracking-widest text-tertiary uppercase mb-1">
          Blog / Articles
        </div>
        <div class="text-base font-medium tracking-wide mb-1 truncate">
          公式 note
        </div>
        <div class="text-xs text-tertiary tracking-wide truncate">
          株式市場・不動産・仮想通貨に関する考察ついて
        </div>
      </div>
      <div class="arrow-icon text-tertiary transition-transform duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </div>
    </a>

        <!-- チャートのアイコン -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-mono text-[10px] tracking-widest text-tertiary uppercase mb-1">
          Securities
        </div>
        <div class="text-base font-medium tracking-wide mb-1 truncate">
          松井証券
        </div>
        <div class="text-xs text-tertiary tracking-wide truncate">
          老舗ネット証券 ・ 口座開設無料

      <div class="arrow-icon text-tertiary transition-transform duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </div>
    </a>

        [ここにSVGアイコンを挿入]

      </div>
    </a>
